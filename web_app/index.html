<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodShare - Donate Surplus Food</title>
    <style>
        :root { --primary: #1A6B3A; --secondary: #2D8A50; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .logo { font-size: 4rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🍲</div>
        <h1>FoodShare</h1>
        <p>Redistributing surplus food in India</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>Don't have an account? <a href="#" style="color: var(--secondary)">Register</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIG: Replace this with your actual config from Firebase Console
        const firebaseConfig = {
            apiKey: "PLACEHOLDER",
            authDomain: "foodshare-placeholder.firebaseapp.com",
            projectId: "foodshare-placeholder",
            storageBucket: "foodshare-placeholder.appspot.com",
            messagingSenderId: "123",
            appId: "123"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = 'dashboard.html'; })
                .catch((error) => { alert(error.message); });
        };
    </script>
</body>
</html>
