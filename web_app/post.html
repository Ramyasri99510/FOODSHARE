<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Food - FoodShare</title>
    <style>
        :root { --primary: #1A6B3A; --secondary: #2D8A50; }
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-top: 2rem; }
        h2 { color: var(--primary); margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .back { margin-top: 1rem; display: block; color: var(--secondary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Post Surplus Food</h2>
        <input type="text" id="foodName" placeholder="Food Name (e.g. Biryani)">
        <select id="category">
            <option value="Cooked Food">Cooked Food</option>
            <option value="Fruits">Fruits</option>
            <option value="Vegetables">Vegetables</option>
        </select>
        <div style="display: flex; gap: 8px;">
            <input type="number" id="quantity" placeholder="Quantity">
            <input type="text" id="unit" placeholder="Unit (kg/pcs)">
        </div>
        <input type="text" id="city" placeholder="Your City">
        <button onclick="postFood()">Post Donation</button>
        <a href="dashboard.html" class="back">← Back to Dashboard</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { projectId: "foodshare-placeholder" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.postFood = async () => {
            const data = {
                foodName: document.getElementById('foodName').value,
                category: document.getElementById('category').value,
                quantity: document.getElementById('quantity').value,
                unit: document.getElementById('unit').value,
                city: document.getElementById('city').value,
                status: "available",
                createdAt: Date.now()
            };

            try {
                await addDoc(collection(db, "foods"), data);
                alert("Donation posted successfully!");
                window.location.href = 'dashboard.html';
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
